name: Deploy interceptor

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'main.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.github/workflows/deploy-interceptor.yml'

concurrency:
  group: deploy-interceptor
  cancel-in-progress: false # never kill a half-finished deploy

permissions:
  contents: read
  id-token: write # Workload Identity Federation

env:
  IMAGE: us-central1-docker.pkg.dev/cme-oi-intraday/vol2vol/vol2vol-interceptor

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          project_id: cme-oi-intraday
          workload_identity_provider: projects/245178351363/locations/global/workloadIdentityPools/github/providers/github-oidc
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - run: docker build -t "$IMAGE:${GITHUB_SHA::7}" -t "$IMAGE:latest" .
      - run: docker push --all-tags "$IMAGE"
      - run: gcloud run jobs update vol2vol-interceptor --image "$IMAGE:${GITHUB_SHA::7}" --region us-central1
